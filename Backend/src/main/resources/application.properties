# ==========================================
# CONFIGURAÇÕES DO STACK BURGERS
# ==========================================

# --- Banco de Dados MySQL ---
# Altere as credenciais conforme seu ambiente local
spring.datasource.url=jdbc:mysql://localhost:3306/stackburgers?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
# update: atualiza o schema automaticamente (bom para desenvolvimento)
# create-drop: recria o banco toda vez (cuidado em produção!)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Servidor ---
server.port=8080

# --- Nome da aplicação ---
spring.application.name=Stack Burgers API

# --- Mensagens de erro mais detalhadas (apenas dev) ---
server.error.include-message=always
server.error.include-binding-errors=always
